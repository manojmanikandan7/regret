suite:
  name: "01_baseline"
  description: >
    Algorithm-family comparison across pseudo-boolean problems of increasing
    difficulty.
    - Research question:
      - At which budget does each algorithm family (local search,
        evolutionary, simulated annealing) overtake the others, and
      - Does the regret trajectory reveal the crossover point before TTFO does?
    - Notes:
      - BinVal is retained: its exponential fitness structure (optimum=2^50-1)
        produces large fitness gaps and very fast convergence for all algorithms,
        providing a qualitative contrast with the other problems;
        - CR_profile_verification is disabled suite-wide: BinVal has f*=2^50-1,
          which would require ~10^15 fitness levels for the profile grid—infeasible
          in memory. The tail-sum formula itself is mathematically valid for any
          fitness function.
        - Profile surface and profile curve plots are also disabled,
          this suite's question is algorithm-family comparison, and profile
          analysis is the primary output of suites 05, 08, and 12; adding them here would
          generate many output files without serving the suite's hypothesis.
      - SA reduced to a single representative schedule (SA-Log-d_2.0) to keep the
        algorithm-family distinction clean;
      - Budget ceiling raised to 10000 to include the regime where LeadingOnes and
        Jump-3 actually converge;
      - budget_for_plots set per-problem relative to E[TTFO].

  runs: 50
  mode: "full"
  parallel: true
  profile: false
  budgets: [200, 500, 1000, 2000, 5000, 10000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "OneMax"
    class: "OneMax"
    budget_for_plots: 2000
    params:
      n: 100

  - name: "LeadingOnes"
    class: "LeadingOnes"
    budget_for_plots: 10000
    params:
      n: 100

  - name: "TwoMax"
    class: "TwoMax"
    budget_for_plots: 2000
    params:
      n: 100

  - name: "Jump-3"
    class: "Jump"
    budget_for_plots: 10000
    params:
      n: 100
      k: 3

  - name: "Trap-10"
    class: "Trap"
    budget_for_plots: 10000
    params:
      n: 100
      k: 10

  - name: "BinVal"
    class: "BinVal"
    budget_for_plots: 500
    params:
      n: 50

algorithms:
  - name: "RLS"
    class: "RLS"
    args:
      defaults: {}
      by_problem: {}

  - name: "RLSExploration"
    class: "RLSExploration"
    args:
      defaults: {}
      by_problem: {}

  - name: "(1+1)-EA"
    class: "OnePlusOneEA"
    args:
      defaults: {}
      by_problem: {}

  - name: "SA-Log-d_2.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 2.0
      by_problem: {}

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
      profile: "profiles"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"
      annotate_pairwise: true
      reference_algorithm: "RLS"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"
      annotate_pairwise: true
      reference_algorithm: "RLS"

    history_current:
      enabled: false
      # filename: "history_current.pdf"
      # series: "current"
      # log_x: false
      # log_y: false
      # show_ttfo_markers: false

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      track_incumbent: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      track_incumbent: false
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      track_incumbent: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      track_incumbent: true
      log_x: false
      log_y: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"
      annotate_pairwise: true
      reference_algorithm: "RLS"
    # Omitted graphs & `enabled: false` graphs are treated the same
    inverse_runtime_profile_surface:
      enabled: false
      # filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: false
      # filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: false
      # filename: "cr_profile_verification.pdf"
