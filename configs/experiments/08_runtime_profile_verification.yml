suite:
  name: "08_runtime_profile_verification"
  description: >
    Validates the regret tail-sum representation
      E[CR(T)] = Sum_{v=1}^{f8} Sum_{t'=1}^{T} P(\tau_v > t')
    on two problems with closed-form drift bounds.

    - RLS and (1+1)-EA achieve E[TTFO] = \theta(n log n) on OneMax
      and \theta(n^2) on LeadingOnes, making the expected shapes of
      both E[CR(T)] derivations predictable.
    - The cr_profile_verification plot is the primary output: disagreement
      between the trajectory-derived and profile-integral-derived E[CR(T)]
      indicates a bug in cumulative_regret, runtime profile construction,
      or trajectory recording. 100 runs reduce Monte-Carlo variance in E[CR(T)]
      to negligible levels.
    - budget_for_plots for LeadingOnes is set to 10000 (~~ 2xE[TTFO])
      to capture the full cumulative regret ramp.
  runs: 100
  mode: "full"
  parallel: true
  profile: true
  budgets: [500, 1000, 2000, 5000, 10000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "OneMax"
    class: "OneMax"
    budget_for_plots: 2000
    params:
      n: 100

  - name: "LeadingOnes"
    class: "LeadingOnes"
    budget_for_plots: 10000
    params:
      n: 100

algorithms:
  - name: "RLS"
    class: "RLS"
    args:
      defaults: {}
      by_problem: {}

  - name: "(1+1)-EA"
    class: "OnePlusOneEA"
    args:
      defaults: {}
      by_problem: {}

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
      profile: "profiles"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      track_incumbent: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      track_incumbent: false
      log_x: false
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      track_incumbent: true
      log_x: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"
      annotate_pairwise: true
      reference_algorithm: "RLS"

    inverse_runtime_profile_surface:
      enabled: true
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: true
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: true
      filename: "cr_profile_verification.pdf"
