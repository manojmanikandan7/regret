suite:
  name: "02_extended"
  description: >
    - Extended pseudo-boolean benchmark using only the four algorithm families
      from the baseline.
    - Research question: does the relative ordering of
      algorithm families (established on easy problems in suite 01) hold on
      harder and structurally more complex problems?
    - Notes:
      - MuPlusLambdaEA variants removed. MuPlusLambdaEA records per-offspring history,
        making instantaneous regret incomparable to single-individual algorithms on the same axis;  #TODO: Cause for another experiment
      - SA d value standardised to 2.0 to match baseline; budget floor raised
        from 100 to 500;
      - algorithms reduced to the same four families as suite 01
        to make cross-suite comparison valid.
  runs: 50
  mode: "full"
  parallel: true
  profile: false
  budgets: [500, 2000, 5000, 10000, 20000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "OneMax"
    class: "OneMax"
    budget_for_plots: 2000
    params:
      n: 100

  - name: "LeadingOnes"
    class: "LeadingOnes"
    budget_for_plots: 10000
    params:
      n: 100

  - name: "TwoMax"
    class: "TwoMax"
    budget_for_plots: 5000
    params:
      n: 100

  - name: "Jump-3"
    class: "Jump"
    budget_for_plots: 10000
    params:
      n: 100
      k: 3

  - name: "Jump-5"
    class: "Jump"
    budget_for_plots: 20000
    params:
      n: 100
      k: 5

  - name: "Trap-5"
    class: "Trap"
    budget_for_plots: 20000
    params:
      n: 100
      k: 5

  - name: "Plateau-10"
    class: "Plateau"
    budget_for_plots: 20000
    params:
      n: 100
      k: 10

  - name: "HIFF-64"
    class: "HIFF"
    budget_for_plots: 20000
    params:
      n: 64

    # Combinatorial
  - name: "Petersen-3-Color"
    class: "PetersenColoringMaxSAT"
    budget_for_plots: 5000
    params: {}

algorithms:
  - name: "RLS"
    class: "RLS"
    args:
      defaults: {}
      by_problem: {}

  - name: "RLSExploration"
    class: "RLSExploration"
    args:
      defaults: {}
      by_problem:
        Jump-3:
          epsilon: 0.05
          decay: false
        Jump-5:
          epsilon: 0.05
          decay: false
        Trap-5:
          epsilon: 0.05
          decay: false

  - name: "(1+1)-EA"
    class: "OnePlusOneEA"
    args:
      defaults: {}
      by_problem: {}

  - name: "SA-Log-d_2.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 2.0
      by_problem:
        Trap-5:
          T_func:
            type: "logarithmic"
            params:
              d: 6.0
        Jump-5:
          T_func:
            type: "logarithmic"
            params:
              d: 6.0

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"

    history_current:
      enabled: false
      filename: "history_current.pdf"
      series: "current"
      log_x: false
      log_y: false
      show_ttfo_markers: false

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      track_incumbent: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      track_incumbent: false
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      track_incumbent: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      track_incumbent: true
      log_x: false
      log_y: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"

    inverse_runtime_profile_surface:
      enabled: false
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: false
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: false
      filename: "cr_profile_verification.pdf"
