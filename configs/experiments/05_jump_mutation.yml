suite:
  name: "05_jump_mutation"
  description: >
    Jump function mutation rate study. 

    - Research question: does the instantaneous regret plateau 
    (the flat band in the log-y trajectory while the algorithm is trapped at ones=n-k) 
    reveal the phase transition in gap-crossing
    difficulty more clearly than TTFO distributions, especially when P(opt)~~0?

    - Notes: 
      - log_y on regret_cumulative corrected to false: cumulative regret is monotone 
        and its slope during the plateau phase (which should grow linearly) is 
        invisible on log scale;
      - (1+1)-EA-mu_0.5-by-n removed: at rate 0.5/n the algorithm is strictly
        dominated on all Jump-k by rate 1/n (lower mutation rate never helps 
        cross a k-bit gap) and its curve adds no insight;
      - inverse_runtime_profile_surface enabled: the two-phase
        behaviour of Jump (fast rise to fitness n-k, then stall) is precisely the
        structure the profile surface is designed to visualise;  
      - budget_for_plots set per-problem to capture plateau onset.
  runs: 25
  mode: "full"
  parallel: true
  profile: false
  budgets: [500, 1000, 2000, 5000, 10000, 20000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "Jump-k2"
    class: "Jump"
    budget_for_plots: 5000
    params:
      n: 100
      k: 2

  - name: "Jump-k3"
    class: "Jump"
    budget_for_plots: 10000
    params:
      n: 100
      k: 3

  - name: "Jump-k5"
    class: "Jump"
    budget_for_plots: 20000
    params:
      n: 100
      k: 5

  - name: "Jump-k7"
    class: "Jump"
    budget_for_plots: 20000
    params:
      n: 100
      k: 7

  - name: "Jump-k10"
    class: "Jump"
    budget_for_plots: 20000
    params:
      n: 100
      k: 10

algorithms:
  - name: "(1+1)-EA-mu_1-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.01
      by_problem: {}

  - name: "(1+1)-EA-mu_2-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.02
      by_problem: {}

  - name: "(1+1)-EA-mu_k-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.03
      by_problem:
        Jump-k2:
          mutation_rate: 0.02
        Jump-k3:
          mutation_rate: 0.03
        Jump-k5:
          mutation_rate: 0.05
        Jump-k7:
          mutation_rate: 0.07
        Jump-k10:
          mutation_rate: 0.10

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
      profile: "profiles"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"

    history_current:
      enabled: false
      filename: "history_current.pdf"
      series: "current"
      log_x: false
      log_y: false
      show_ttfo_markers: false

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      use_best: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      use_best: false
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      use_best: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      use_best: true
      log_x: false
      log_y: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"

    inverse_runtime_profile_surface:
      enabled: true
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: true
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: false
      filename: "cr_profile_verification.pdf"