suite:
  name: "06_plateau_mutation"
  description: >
    Neutral fitness landscape study. 

    - Research question: Given that Plateau-k and Jump-k have the same 
      expected crossing time \delta(n^k) at rate 1/n,
      do their cumulative regret trajectories differ in shape?
      - The prediction is that Plateau accumulates regret at a lower initial 
        rate than Jump (no fitness penalty during the neutral walk, so the 
        pre-plateau hill-climbing phase is identical in shape) 
        but after entering the neutral zone the slope should match.
      - The comparison is only meaningful if the same algorithms
        run on both problems; this suite uses the identical four mutation rates
        from suite 05, and SA-Log-d_4.0 is added so that three algorithm classes
        are represented: EA-varying-rate, and SA.

    - Notes: 
      - mu_3-by-n and mu_7-by-n removed: neither has
        theoretical motivation and they produce curves between the already-tested
        neighbors without testing a distinct hypothesis; 
      - SA-Log-d_4.0 added as the third algorithm class; 
      - Algorithm set now matches suite 04 and suite 05 for direct cross-suite 
        comparison on identical k values.
  runs: 30
  mode: "full"
  parallel: true
  profile: false
  budgets: [500, 1000, 2000, 5000, 10000, 20000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "Plateau-k2"
    class: "Plateau"
    budget_for_plots: 5000
    params:
      n: 100
      k: 2

  - name: "Plateau-k5"
    class: "Plateau"
    budget_for_plots: 10000
    params:
      n: 100
      k: 5

  - name: "Plateau-k10"
    class: "Plateau"
    budget_for_plots: 20000
    params:
      n: 100
      k: 10

  - name: "Plateau-k20"
    class: "Plateau"
    budget_for_plots: 20000
    params:
      n: 100
      k: 20

algorithms:
  - name: "(1+1)-EA-mu_1-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.01
      by_problem: {}

  - name: "(1+1)-EA-mu_2-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.02
      by_problem: {}

  - name: "(1+1)-EA-mu_5-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.05
      by_problem: {}

  - name: "SA-Log-d_4.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 4.0
      by_problem: {}

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"

    history_current:
      enabled: false
      filename: "history_current.pdf"
      series: "current"
      log_x: false
      log_y: false
      show_ttfo_markers: false

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      use_best: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      use_best: false
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      use_best: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      use_best: true
      log_x: false
      log_y: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"

    inverse_runtime_profile_surface:
      enabled: false
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: false
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: false
      filename: "cr_profile_verification.pdf"