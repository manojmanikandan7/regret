suite:
  name: "10_barrier_comparison"
  description: >
    - Directly compares three structural barrier archetypes at equal nominal
      width k=5 (n=100): 
      - Jump-k5 (gap — fitness is penalised in [n-k+1,n-1],
        so the gradient reverses near the top), 
      - Trap-k5 (deceptive — the fitness
        gradient everywhere points away from the global optimum toward ones=0), and
      - Plateau-k5 (neutral — fitness is flat in [n-k,n-1], no penalty but
        no gradient signal). 
    - The research question is whether cumulative regret reveals the structural
      difference: 
      - Trap should accumulate regret at high rate from step 1 (no gradient 
        benefit before the barrier);
      - Jump should show low cumulative regret during hill-climbing then 
        a sharp inflection;
      - Plateau should behave like Jump but with a slightly earlier inflection
       (no fitness penalty during the neutral walk). 
    - Notes:
      - All three have E[TTFO]=\theta(n^k) at rate 1/n, so TTFO
        histograms cannot distinguish them when P(opt)~~0 within budget.
      - Four mutation rates are applied uniformly to separate rate sensitivity 
        from structural effects.
      - Budget 50000 captures plateau/valley crossing for k=5 at moderate rates.
  runs: 30
  mode: "full"
  parallel: true
  profile: false
  budgets: [1000, 5000, 10000, 25000, 50000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "Jump-k5"
    class: "Jump"
    budget_for_plots: 50000
    params:
      n: 100
      k: 5

  - name: "Trap-k5"
    class: "Trap"
    budget_for_plots: 50000
    params:
      n: 100
      k: 5

  - name: "Plateau-k5"
    class: "Plateau"
    budget_for_plots: 50000
    params:
      n: 100
      k: 5

algorithms:
  - name: "(1+1)-EA-mu_0.5-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.005
      by_problem: {}

  - name: "(1+1)-EA-mu_1-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.01
      by_problem: {}

  - name: "(1+1)-EA-mu_2-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.02
      by_problem: {}

  - name: "(1+1)-EA-mu_5-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.05
      by_problem: {}

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"
      annotate_pairwise: true
      reference_algorithm: "(1+1)-EA-mu_1-by-n"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"
      annotate_pairwise: true
      reference_algorithm: "(1+1)-EA-mu_1-by-n"

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      track_incumbent: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      track_incumbent: false
      log_x: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      track_incumbent: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      track_incumbent: true
      log_x: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"
      annotate_pairwise: true
      reference_algorithm: "(1+1)-EA-mu_1-by-n"