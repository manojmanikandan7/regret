suite:
  name: "11_sa_cooling_diagnostics"
  description: >
    Tests whether the SA cooling schedule leaves a detectable signature in the
    instantaneous regret trajectory.
    - The hypothesis is that fast-cooling schedules will show an
      instantaneous regret plateau whose onset time matches the temperature
      collapse point, while slow logarithmic schedules will show a sustained
      decline.
    - On LeadingOnes the difference should be larger because local
      optima are harder to escape and temperature matters more.

    - Logarithmic cooling T(t)=d/log(t+1) is theoretically motivated:
      it maintains sufficient acceptance probability throughout the run
      and is the only schedule proven to reach the global optimum in polynomial
      expected time on certain problem classes.
    - Linear and exponential schedules cool to zero and reduce SA to a
      stochastic hill-climber after a finite prefix.

    - Six logarithmic variants (d=0.5,1,2,4,8,16) span from degenerate-greedy
      to extremely slow cooling.
      RLS is included as the T=0 reference; any SA variant that underperforms RLS is misconfigured or
      over-cooled.
  runs: 50
  mode: "full"
  parallel: true
  profile: false
  budgets: [500, 1000, 2000, 5000, 10000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "OneMax"
    class: "OneMax"
    budget_for_plots: 2000
    params:
      n: 100

  - name: "LeadingOnes"
    class: "LeadingOnes"
    budget_for_plots: 5000
    params:
      n: 100

algorithms:
  - name: "RLS"
    class: "RLS"
    args:
      defaults: {}
      by_problem: {}

  - name: "SA-Log-d_0.5"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 0.5
      by_problem: {}

  - name: "SA-Log-d_1.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 1.0
      by_problem: {}

  - name: "SA-Log-d_2.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 2.0
      by_problem: {}

  - name: "SA-Log-d_4.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 4.0
      by_problem: {}

  - name: "SA-Log-d_8.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 8.0
      by_problem: {}

  - name: "SA-Log-d_16.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 16.0
      by_problem: {}

  - name: "SA-Lin"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "linear"
          params: {}
      by_problem: {}

  - name: "SA-Exp"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "exponential"
          params: {}
      by_problem: {}

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"
      annotate_pairwise: true
      reference_algorithm: "RLS"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"
      annotate_pairwise: true
      reference_algorithm: "RLS"

    history_current:
      enabled: false
      filename: "history_current.pdf"
      series: "current"
      log_x: false
      log_y: false
      show_ttfo_markers: false

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      use_best: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      use_best: false
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: false
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      use_best: true
      log_x: false
      log_y: true
      show_ttfo_markers: false

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      use_best: true
      log_x: false
      log_y: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"
      annotate_pairwise: true
      reference_algorithm: "RLS"

    inverse_runtime_profile_surface:
      enabled: false
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: false
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: false
      filename: "cr_profile_verification.pdf"
