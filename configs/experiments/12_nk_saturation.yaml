suite:
  name: "12_nk_saturation"
  description: >
    Investigates regret saturation on the NK landscape as epistasis k increases
    from fully separable (k=0, independent bits) to near-random (k=8, dense
    pairwise dependencies).
    - As k increases, local optima proliferate and gradient-following algorithms
      converge to suboptimal solutions.
    - This saturation appears in instantaneous regret as a permanent non-zero floor:
      the algorithm finds a local optimum and cannot escape, accumulating linear
      cumulative regret indefinitely.
    - The inverse runtime profile surface P(\tau_v ≤ T)
      captures this as a truncated front - it rises to some v_local < f* and
      stalls, regardless of budget.
    - Three algorithms span the exploration-
      - exploitation spectrum: RLS (zero-temperature hill-climber, saturates
    earliest),
      - (1+1)-EA (mild exploration via multi-bit flips), and
      - SA-Log with d=4 (sustained acceptance of worsening moves).
        SA-Log uses a larger d on high-epistasis problems via by_problem overrides
        to compensate for higher expected energy barriers.
    - n=20 is required by NKLandscape because
      get_optimum_value() runs exhaustive 2^20 search at init. Budget 50000
      reveals the asymptotic regret floor and runtime profile saturation.
  runs: 25
  mode: "full"
  parallel: true
  profile: true
  budgets: [500, 2000, 10000, 25000, 50000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "NK-k0"
    class: "NKLandscape"
    budget_for_plots: 10000
    params:
      n: 20
      k: 0
      seed: 42

  - name: "NK-k2"
    class: "NKLandscape"
    budget_for_plots: 25000
    params:
      n: 20
      k: 2
      seed: 42

  - name: "NK-k4"
    class: "NKLandscape"
    budget_for_plots: 50000
    params:
      n: 20
      k: 4
      seed: 42

  - name: "NK-k6"
    class: "NKLandscape"
    budget_for_plots: 50000
    params:
      n: 20
      k: 6
      seed: 42

  - name: "NK-k8"
    class: "NKLandscape"
    budget_for_plots: 50000
    params:
      n: 20
      k: 8
      seed: 42

algorithms:
  - name: "RLS"
    class: "RLS"
    args:
      defaults: {}
      by_problem: {}

  - name: "(1+1)-EA"
    class: "OnePlusOneEA"
    args:
      defaults: {}
      by_problem: {}

  - name: "SA-Log-d_4.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 4.0
      by_problem:
        NK-k4:
          T_func:
            type: "logarithmic"
            params:
              d: 8.0
        NK-k6:
          T_func:
            type: "logarithmic"
            params:
              d: 8.0
        NK-k8:
          T_func:
            type: "logarithmic"
            params:
              d: 12.0

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
      profile: "profiles"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    performance_profile:
      enabled: false
      filename: "performance_profile_b{budget}.pdf"

    history_current:
      enabled: false
      filename: "history_current.pdf"
      series: "current"
      log_x: false
      log_y: false
      show_ttfo_markers: false

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      use_best: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      use_best: false
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      use_best: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      use_best: true
      log_x: false
      log_y: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"

    inverse_runtime_profile_surface:
      enabled: true
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: true
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: false
      filename: "cr_profile_verification.pdf"
