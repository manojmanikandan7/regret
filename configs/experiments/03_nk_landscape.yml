suite:
  name: "03_nk_landscape"
  description: >
    NK landscape ruggedness study: SA logarithmic cooling d=0.5,1,2,4,8,16
    crossed with epistasis k=1,2,4,6,8. 

    - Research question: 
      - How does cooling schedule interact with landscape ruggedness, 
      - and does the instantaneous regret floor (indicating saturation at a local optimum) correlate with
        the d-value that maximises convergence probability at each k?

    - Notes: 
      - RLS and (1+1)-EA added as T=0 baselines, without
        a zero-temperature reference it is impossible to determine whether any SA
        variant improves on pure hill-climbing, and on low-epistasis landscapes
        (k=1, k=2) SA may actually underperform RLS due to temperature-induced
        noise; 
      - Runs increased from 10 to 25 to produce stable SEM bands on the
        regret curves; inverse_runtime_profile_surface enabled to visualise the
        saturation frontier across k values.
  runs: 25
  mode: "full"
  parallel: true
  profile: true
  budgets: [500, 1000, 5000, 10000, 25000, 50000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "NK-k1"
    class: "NKLandscape"
    budget_for_plots: 10000
    params:
      n: 20
      k: 1
      seed: 42

  - name: "NK-k2"
    class: "NKLandscape"
    budget_for_plots: 25000
    params:
      n: 20
      k: 2
      seed: 42

  - name: "NK-k4"
    class: "NKLandscape"
    budget_for_plots: 50000
    params:
      n: 20
      k: 4
      seed: 42

  - name: "NK-k6"
    class: "NKLandscape"
    budget_for_plots: 50000
    params:
      n: 20
      k: 6
      seed: 42

  - name: "NK-k8"
    class: "NKLandscape"
    budget_for_plots: 50000
    params:
      n: 20
      k: 8
      seed: 42

algorithms:
  - name: "RLS"
    class: "RLS"
    args:
      defaults: {}
      by_problem: {}

  - name: "(1+1)-EA"
    class: "OnePlusOneEA"
    args:
      defaults: {}
      by_problem: {}

  - name: "SA-Log-d_0.5"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 0.5
      by_problem: {}

  - name: "SA-Log-d_1.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 1.0
      by_problem: {}

  - name: "SA-Log-d_2.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 2.0
      by_problem: {}

  - name: "SA-Log-d_4.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 4.0
      by_problem: {}

  - name: "SA-Log-d_8.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 8.0
      by_problem: {}

  - name: "SA-Log-d_16.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 16.0
      by_problem: {}

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
      profile: "profiles"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      track_incumbent: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      track_incumbent: false
      log_x: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      track_incumbent: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      track_incumbent: true
      log_x: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"

    inverse_runtime_profile_surface:
      enabled: true
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: true
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: true
      filename: "cr_profile_verification.pdf"