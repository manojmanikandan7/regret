suite:
  name: "04_trap_mutation"
  description: >
    Deceptive fitness landscape study with the Trap function.

    - Research question: 
      - Does increasing the deception width k change the *shape* of the cumulative regret trajectory
        (not just the final regret value), and
      - Does SA's acceptance of worsening moves allow it to escape the deceptive basin where the EA cannot?

    - Notes:
      - k=1 removed - fully deceptive trap produces flat
        zero-convergence plots for all algorithms at all rates, confirming known
        theory without any regret-specific insight; 
      - k=3 removed in favour of k=8 to widen the spacing and expose qualitative 
        differences in regret shape between moderate and wide deception; 
      - SA-Log-d_4.0 added as a comparison; SA is the natural algorithm 
        for deceptive landscapes (accepting worsening moves is the mechanism needed to escape) 
      - Mutation rates reduced to four theoretically motivated values (0.5/n, 1/n, 2/n, 5/n) 
        to match suites 05 and 06, enabling direct cross-suite comparison.
  runs: 25
  mode: "full"
  parallel: true
  profile: false
  budgets: [500, 1000, 2000, 5000, 10000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "Trap-k5"
    class: "Trap"
    budget_for_plots: 10000
    params:
      n: 100
      k: 5

  - name: "Trap-k8"
    class: "Trap"
    budget_for_plots: 10000
    params:
      n: 100
      k: 8

  - name: "Trap-k10"
    class: "Trap"
    budget_for_plots: 10000
    params:
      n: 100
      k: 10

  - name: "Trap-k20"
    class: "Trap"
    budget_for_plots: 10000
    params:
      n: 100
      k: 20

algorithms:
  - name: "(1+1)-EA-mu_0.5-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.005
      by_problem: {}

  - name: "(1+1)-EA-mu_1-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.01
      by_problem: {}

  - name: "(1+1)-EA-mu_2-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.02
      by_problem: {}

  - name: "(1+1)-EA-mu_5-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.05
      by_problem: {}

  - name: "SA-Log-d_4.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 4.0
      by_problem:
        Trap-k20:
          T_func:
            type: "logarithmic"
            params:
              d: 8.0

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      track_incumbent: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      track_incumbent: false
      log_x: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      track_incumbent: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      track_incumbent: true
      log_x: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"