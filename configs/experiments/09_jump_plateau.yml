suite:
  name: "09_jump_plateau"
  description: >
    Tests whether the duration of the instantaneous regret plateau (the flat
    band in the log-y trajectory while the algorithm is trapped at ones=n-k)
    scales as \theta(n^k) for Jump-k. 

    - Two algorithms are compared: (1+1)-EA 
      - At the standard rate 1/n (expected gap-crossing time 
        \theta(n^k)) and 
      - At the theoretically motivated rate k/n, 
        which maximises P(exactly k bit-flips) and achieves expected 
        crossing time O(sqrt(k)·n log n). 
        
    - The plateau is visible even in runs that never cross the gap, making 
      it a strictly more informative signal than TTFO distributions when P(opt)~~0. 
    - Five gap widths k=2,3,5,7,10 span from "solvable within budget at rate k/n" 
      to "almost never solved at any fixed rate within budget," tracing the 
      full solvability phase transition. 
      
    - Budgets extend to 50000 to capture plateau onset for k=5
      and plateau duration for k<=3.

  runs: 25
  mode: "full"
  parallel: true
  profile: false
  budgets: [1000, 5000, 10000, 25000, 50000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "Jump-k2"
    class: "Jump"
    budget_for_plots: 10000
    params:
      n: 100
      k: 2

  - name: "Jump-k3"
    class: "Jump"
    budget_for_plots: 25000
    params:
      n: 100
      k: 3

  - name: "Jump-k5"
    class: "Jump"
    budget_for_plots: 50000
    params:
      n: 100
      k: 5

  - name: "Jump-k7"
    class: "Jump"
    budget_for_plots: 50000
    params:
      n: 100
      k: 7

  - name: "Jump-k10"
    class: "Jump"
    budget_for_plots: 50000
    params:
      n: 100
      k: 10

algorithms:
  - name: "(1+1)-EA-mu_1-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.01
      by_problem: {}

  - name: "(1+1)-EA-mu_k-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.03
      by_problem:
        Jump-k2:
          mutation_rate: 0.02
        Jump-k3:
          mutation_rate: 0.03
        Jump-k5:
          mutation_rate: 0.05
        Jump-k7:
          mutation_rate: 0.07
        Jump-k10:
          mutation_rate: 0.10

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      track_incumbent: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      track_incumbent: false
      log_x: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      track_incumbent: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      track_incumbent: true
      log_x: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"