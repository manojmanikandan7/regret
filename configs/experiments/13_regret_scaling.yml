suite:
  name: "13_regret_scaling"
  description: >
    Tests whether cumulative regret scales with n as predicted by drift
    analysis.
    - For OneMax, the (1+1)-EA achieves E[TTFO]=\theta(n log n), which
      implies E[CR(T)] at a fixed relative budget T=c.n.log(n) should scale as
      \theta(n): before convergence, instantaneous regret decays from roughly n to 0
      over an interval of length \theta(n log n), so the integral scales linearly
      with n.
    - Empirically this predicts that the log-log regret curve for n=2N
      will be shifted rightward by log(2)~~0.69 relative to n=N, with the same
      slope.
    - Four sizes n=25,50,100,200 provide two doublings on each side of
      the canonical n=100 baseline.
    - Mutation rate is set per-problem to exactly 1/n via by_problem overrides.
      budget_for_plots is calibrated to approximately 5.n.log2(n) for each n
      so that the history plots capture the full pre- and post-convergence
      dynamics.
    - 60 runs give low-variance E[CR(T)] estimates for fitting the scaling exponent.
  runs: 60
  mode: "full"
  parallel: true
  profile: false
  budgets: [100, 500, 1000, 2500, 5000, 10000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "OneMax-n25"
    class: "OneMax"
    budget_for_plots: 1000
    params:
      n: 25

  - name: "OneMax-n50"
    class: "OneMax"
    budget_for_plots: 2500
    params:
      n: 50

  - name: "OneMax-n100"
    class: "OneMax"
    budget_for_plots: 5000
    params:
      n: 100

  - name: "OneMax-n200"
    class: "OneMax"
    budget_for_plots: 10000
    params:
      n: 200

algorithms:
  - name: "(1+1)-EA-mu_1-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.01
      by_problem:
        OneMax-n25:
          mutation_rate: 0.04
        OneMax-n50:
          mutation_rate: 0.02
        OneMax-n100:
          mutation_rate: 0.01
        OneMax-n200:
          mutation_rate: 0.005

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: false
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    performance_profile:
      enabled: false
      filename: "performance_profile_b{budget}.pdf"

    history_current:
      enabled: false
      filename: "history_current.pdf"
      series: "current"
      log_x: false
      log_y: false
      show_ttfo_markers: false

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      use_best: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      use_best: false
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: false
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      use_best: true
      log_x: false
      log_y: true
      show_ttfo_markers: false

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      use_best: true
      log_x: false
      log_y: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"

    inverse_runtime_profile_surface:
      enabled: false
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: false
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: false
      filename: "cr_profile_verification.pdf"
