suite:
  name: "07_hiff_scale"
  description: >
    HIFF scaling study. 
    
    - Research question: does regret grow polynomially or
      exponentially with hierarchical depth (log2(n))? 
      - Prediction: the (1+1)-EA at rate 1/n will show near-zero convergence
        probability for n=128 within budget (each hierarchical level multiplies 
        the expected crossing time), whereas SA-Log with a slow cooling schedule
        may sustain progress by accepting sub-block disruptions that reorganise 
        the hierarchy. 
      - RLS is included as the T=0 baseline: a 1-bit flip destroys any uniform block it
        touches, so RLS will saturate immediately at the first hierarchical level
        for n>=64, making its saturation explicit anchors the EA and SA results.

    - Notes: 
      - RLS added as T=0 reference whose rapid saturation will make the EA 
        and SA results interpretable; 
      - SA-Log-d_4.0 added because hierarchical sub-block barriers at each 
        level are precisely the structure that temperature-based acceptance 
        is designed to escape; 
      - Mutation rate for 3/n on n=32 is kept as an explicit "disruptive" rate
        with the prediction that it will hurt n=32 but the disruptive effect 
        will diminish relative to the crossing benefit at higher n 
        (where 3/n flips fewer relative bits);
      - budget_for_plots for n=128 set to 50000 as an explicit "expected unsolved"
        reference - flat convergence curves for n=128 are informative when n=32
        and n=64 show measurable progress in the same plot.
  runs: 25
  mode: "full"
  parallel: true
  profile: false
  budgets: [500, 1000, 5000, 10000, 20000, 50000]
  output:
    raw_root: "results/raw"
    figures_root: "results/figures"

problems:
  - name: "HIFF-n32"
    class: "HIFF"
    budget_for_plots: 10000
    params:
      n: 32

  - name: "HIFF-n64"
    class: "HIFF"
    budget_for_plots: 20000
    params:
      n: 64

  - name: "HIFF-n128"
    class: "HIFF"
    budget_for_plots: 50000
    params:
      n: 128

algorithms:
  - name: "RLS"
    class: "RLS"
    args:
      defaults: {}
      by_problem: {}

  - name: "(1+1)-EA-mu_0.5-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.0078125
      by_problem:
        HIFF-n32:
          mutation_rate: 0.015625
        HIFF-n64:
          mutation_rate: 0.0078125
        HIFF-n128:
          mutation_rate: 0.00390625

  - name: "(1+1)-EA-mu_1-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.015625
      by_problem:
        HIFF-n32:
          mutation_rate: 0.03125
        HIFF-n64:
          mutation_rate: 0.015625
        HIFF-n128:
          mutation_rate: 0.0078125

  - name: "(1+1)-EA-mu_2-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.03125
      by_problem:
        HIFF-n32:
          mutation_rate: 0.0625
        HIFF-n64:
          mutation_rate: 0.03125
        HIFF-n128:
          mutation_rate: 0.015625

  - name: "(1+1)-EA-mu_3-by-n"
    class: "OnePlusOneEA"
    args:
      defaults:
        mutation_rate: 0.046875
      by_problem:
        HIFF-n32:
          mutation_rate: 0.09375
        HIFF-n64:
          mutation_rate: 0.046875
        HIFF-n128:
          mutation_rate: 0.0234375

  - name: "SA-Log-d_4.0"
    class: "SimulatedAnnealing"
    args:
      defaults:
        T_func:
          type: "logarithmic"
          params:
            d: 4.0
      by_problem: {}

plotting:
  enabled: true
  layout:
    per_problem_dir: true
    include_n_subdir: true
    structure:
      aggregate: "aggregate"
      history: "history"
      distribution: "distributions"
  titles:
    include_problem_name: true
    include_problem_size: true
  plots:
    regret_curves:
      enabled: true
      filename: "regret_curves.pdf"
      log_scale: true

    convergence_probability:
      enabled: true
      filename: "convergence_probability.pdf"

    comparison_heatmap:
      enabled: true
      filename: "comparison_heatmap.pdf"

    regret_boxplots:
      enabled: true
      filename: "regret_boxplot_b{budget}.pdf"

    performance_profile:
      enabled: true
      filename: "performance_profile_b{budget}.pdf"

    history_current:
      enabled: false
      filename: "history_current.pdf"
      series: "current"
      log_x: false
      log_y: false
      show_ttfo_markers: false

    history_best:
      enabled: true
      filename: "history_best.pdf"
      series: "best"
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous:
      enabled: true
      filename: "history_regret_instantaneous.pdf"
      series: "instantaneous"
      use_best: false
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative:
      enabled: true
      filename: "history_regret_cumulative.pdf"
      series: "cumulative"
      use_best: false
      log_x: false
      log_y: false
      show_ttfo_markers: true

    regret_instantaneous_best:
      enabled: true
      filename: "history_regret_instantaneous_best.pdf"
      series: "instantaneous"
      use_best: true
      log_x: false
      log_y: true
      show_ttfo_markers: true

    regret_cumulative_best:
      enabled: true
      filename: "history_regret_cumulative_best.pdf"
      series: "cumulative"
      use_best: true
      log_x: false
      log_y: false
      show_ttfo_markers: true

    ttfo_distribution:
      enabled: true
      filename: "history_ttfo_markers.pdf"

    inverse_runtime_profile_surface:
      enabled: false
      filename: "inverse_runtime_profile_surface_{algorithm}.pdf"

    inverse_runtime_profile_curves:
      enabled: false
      filename: "inverse_runtime_profile_curves.pdf"

    cr_profile_verification:
      enabled: false
      filename: "cr_profile_verification.pdf"